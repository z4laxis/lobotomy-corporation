<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Angela Face Switcher</title>
    <style>
        html {
            cursor: url(/assets/img/cursor/normal.png), default;
        }

        body, h1 {
            height: 100%;
            cursor: url(/assets/img/cursor/wait.png), wait;
        }

        .click-area {
            margin-top: 50px;
            padding: 20px;
            display: inline-block;
            background-color: #eee;
            border: 1px solid #ccc;
            cursor: url(/assets/img/cursor/click.png), pointer;
        }
    </style>
</head>
<body>
    <h1>Angela Face Switcher</h1>
    <div class="click-area">
        Click Me
    </div>
</body>
</html>
